<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0e00;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d1b00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001a2d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c96a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a07030;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="pond" cx="50%" cy="55%" r="30%">
      <stop offset="0%" style="stop-color:#003355;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#001a2d;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="44%" r="36%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#c9a84c;stop-opacity:0" />
    </radialGradient>
    <pattern id="waves-pattern" x="0" y="0" width="80" height="20" patternUnits="userSpaceOnUse">
      <path d="M0,10 Q20,4 40,10 Q60,16 80,10" fill="none" stroke="#c9a84c" stroke-width="0.6" opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#pond)"/>
  <rect width="800" height="600" fill="url(#glow)"/>

  <!-- Borders -->
  <rect x="0" y="0" width="800" height="3" fill="url(#gold)" opacity="0.5"/>
  <rect x="0" y="597" width="800" height="3" fill="url(#gold)" opacity="0.5"/>
  <rect x="0" y="0" width="3" height="600" fill="url(#gold)" opacity="0.5"/>
  <rect x="797" y="0" width="3" height="600" fill="url(#gold)" opacity="0.5"/>

  <!-- Corner accents -->
  <path d="M20,20 L60,20 M20,20 L20,60" stroke="#c9a84c" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M780,20 L740,20 M780,20 L780,60" stroke="#c9a84c" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M20,580 L60,580 M20,580 L20,540" stroke="#c9a84c" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M780,580 L740,580 M780,580 L780,540" stroke="#c9a84c" stroke-width="2" fill="none" opacity="0.7"/>

  <!-- Pond ellipse -->
  <ellipse cx="400" cy="295" rx="200" ry="90" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.3"/>
  <ellipse cx="400" cy="295" rx="180" ry="78" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.15"/>

  <!-- Wave lines inside pond -->
  <path d="M290,285 Q320,278 350,285 Q380,292 410,285" stroke="#c9a84c" stroke-width="1.2" fill="none" opacity="0.35"/>
  <path d="M350,305 Q380,298 410,305 Q440,312 470,305" stroke="#c9a84c" stroke-width="1.2" fill="none" opacity="0.35"/>
  <path d="M310,320 Q340,313 370,320" stroke="#c9a84c" stroke-width="1" fill="none" opacity="0.25"/>

  <!-- Fish icon — centered 400,265 -->
  <!-- Body -->
  <ellipse cx="400" cy="255" rx="55" ry="22" fill="none" stroke="url(#gold)" stroke-width="2.5" opacity="0.85"/>
  <!-- Tail -->
  <path d="M455,255 L485,235 L485,275 Z" fill="none" stroke="url(#gold)" stroke-width="2.5" opacity="0.85"/>
  <!-- Eye -->
  <circle cx="362" cy="252" r="5" fill="none" stroke="#c9a84c" stroke-width="2" opacity="0.8"/>
  <circle cx="362" cy="252" r="2" fill="#c9a84c" opacity="0.7"/>
  <!-- Mouth -->
  <path d="M347,258 Q342,262 347,266" stroke="#c9a84c" stroke-width="1.5" fill="none" opacity="0.7"/>
  <!-- Dorsal fin -->
  <path d="M380,233 Q395,215 415,233" stroke="#c9a84c" stroke-width="2" fill="none" opacity="0.7"/>
  <!-- Scale arc hint -->
  <path d="M390,248 Q400,240 410,248" stroke="#c9a84c" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M408,254 Q418,246 428,254" stroke="#c9a84c" stroke-width="1" fill="none" opacity="0.35"/>

  <!-- Fishing line from top -->
  <line x1="400" y1="140" x2="400" y2="232" stroke="#c9a84c" stroke-width="1" opacity="0.4" stroke-dasharray="4,4"/>
  <!-- Hook hint -->
  <circle cx="400" cy="236" r="4" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>

  <!-- Divider -->
  <line x1="180" y1="400" x2="620" y2="400" stroke="#c9a84c" stroke-width="1" opacity="0.35"/>

  <!-- Main label -->
  <text x="400" y="442" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="33" font-weight="bold" fill="url(#gold)" letter-spacing="2">STOCKED FISHING POND</text>
  <text x="400" y="477" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="#c9a84c" opacity="0.7" letter-spacing="2">OTTER VALLEY ROD &amp; GUN CLUB</text>

  <circle cx="170" cy="442" r="3" fill="#c9a84c" opacity="0.5"/>
  <circle cx="630" cy="442" r="3" fill="#c9a84c" opacity="0.5"/>

  <rect x="300" y="530" width="200" height="28" rx="4" fill="#c9a84c" opacity="0.08"/>
  <text x="400" y="549" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#c9a84c" opacity="0.5" letter-spacing="1">PHOTO PLACEHOLDER</text>
</svg>
